name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git describe

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -race -timeout 60s

      - name: Set version metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT:  ${{ steps.meta.outputs.commit }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
          CGO_ENABLED: 0
        run: |
          mkdir -p bin/dist

          build() {
            local os=$1 arch=$2 ext=${3:-}
            echo "Building ${os}/${arch}..."
            GOOS=$os GOARCH=$arch go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
              -o bin/tinydm-${os}-${arch}${ext} \
              ./cmd/tinydm
          }

          build linux   amd64
          build linux   arm64
          build darwin  amd64
          build darwin  arm64
          build windows amd64 .exe
          build windows arm64 .exe

      - name: Package archives
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          cd bin
          tar -czf dist/tinydm-${VERSION}-linux-amd64.tar.gz   tinydm-linux-amd64
          tar -czf dist/tinydm-${VERSION}-linux-arm64.tar.gz   tinydm-linux-arm64
          tar -czf dist/tinydm-${VERSION}-darwin-amd64.tar.gz  tinydm-darwin-amd64
          tar -czf dist/tinydm-${VERSION}-darwin-arm64.tar.gz  tinydm-darwin-arm64
          zip -q    dist/tinydm-${VERSION}-windows-amd64.zip   tinydm-windows-amd64.exe
          zip -q    dist/tinydm-${VERSION}-windows-arm64.zip   tinydm-windows-arm64.exe
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TinyDM ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: bin/dist/*
