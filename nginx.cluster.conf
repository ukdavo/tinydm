worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstream — TinyDM application nodes ───────────────────────────────
    upstream tinydm {
        least_conn;  # route to the node with the fewest active connections

        server tinydm-1:8080 fail_timeout=10s max_fails=3;
        server tinydm-2:8080 fail_timeout=10s max_fails=3;
        server tinydm-3:8080 fail_timeout=10s max_fails=3;

        # Keepalive connections to backend nodes.
        keepalive 32;
    }

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── HTTP → proxy pass ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Increase client body size to allow large document uploads.
        client_max_body_size 512m;

        # Timeouts suitable for large uploads and streaming downloads.
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout  10s;

        # Pass the real client IP to the application.
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host              $host;

        # Keepalive to backend.
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        location / {
            proxy_pass http://tinydm;
        }

        # Health check endpoint — nginx can probe this directly.
        location /health {
            proxy_pass http://tinydm/health;
            access_log off;
        }
    }
}
