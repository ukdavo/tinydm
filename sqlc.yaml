version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/queries/"
    schema:  "internal/db/migrations/"
    gen:
      go:
        package:              "dbgen"
        out:                  "internal/db/gen"
        sql_package:          "database/sql"
        emit_json_tags:       true
        emit_db_tags:         true
        emit_pointers_for_null_types: true
        emit_empty_slices:    true
